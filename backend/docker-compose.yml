services:
  db:
    image: postgres:15-alpine
    container_name: workspace-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: workspace_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  backend:
    build: .
    container_name: workspace-backend
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      # - DATABASE_URL=postgresql://devuser:dev_password@db:5432/workspace_db
      - DJANGO_ENV=development
      - DJANGO_SETTINGS_MODULE=settings.dev
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: "always"
    deploy:
      resources:
        limits:
          memory: 512M
    command: bash entrypoint.sh

volumes:
  postgres_data:
